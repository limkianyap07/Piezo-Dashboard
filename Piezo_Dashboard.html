<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piezo-AI Energy Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg: #0d0f14;
      --c-surface: #14171f;
      --c-card: #1a1e28;
      --c-border: rgba(255,255,255,0.07);
      --c-border2: rgba(255,255,255,0.12);
      --c-text: #e8ecf4;
      --c-muted: #7a8499;
      --c-high: #f97316;
      --c-med: #facc15;
      --c-low: #22d3ee;
      --c-off: #475569;
      --c-green: #4ade80;
      --c-accent: #818cf8;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-main);
      font-size: 14px;
      padding: 0;
    }

    /* ── Layout ── */
    .dash {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 16px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 4px;
      border-bottom: 0.5px solid var(--c-border2);
      margin-bottom: 4px;
    }
    .hdr-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-accent);
    }
    .hdr-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-muted);
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c-green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Cards ── */
    .card {
      background: var(--c-card);
      border: 0.5px solid var(--c-border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-bottom: 10px;
    }

    .col-span2 { grid-column: span 2; }
    .col-span3 { grid-column: 1/-1; }

    /* ── Section 1: Zone Cards ── */
    .zones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .zone-card {
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
      border: 0.5px solid var(--c-border2);
      background: var(--c-surface);
      transition: all 0.4s;
    }
    .zone-name {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-muted);
      margin-bottom: 6px;
    }
    .zone-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .zone-bright {
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .HIGH .zone-badge { background: rgba(249,115,22,0.15); color: var(--c-high); border: 0.5px solid rgba(249,115,22,0.3); }
    .HIGH .zone-bright { color: var(--c-high); }
    .MEDIUM .zone-badge { background: rgba(250,204,21,0.12); color: var(--c-med); border: 0.5px solid rgba(250,204,21,0.3); }
    .MEDIUM .zone-bright { color: var(--c-med); }
    .LOW .zone-badge { background: rgba(34,211,238,0.1); color: var(--c-low); border: 0.5px solid rgba(34,211,238,0.25); }
    .LOW .zone-bright { color: var(--c-low); }
    .OFF .zone-badge { background: rgba(71,85,105,0.2); color: var(--c-off); border: 0.5px solid rgba(71,85,105,0.4); }
    .OFF .zone-bright { color: var(--c-off); }

    /* ── Section 2: Input Stream ── */
    .inputs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .input-row {
      background: var(--c-surface);
      border-radius: 8px;
      padding: 10px 12px;
      border: 0.5px solid var(--c-border);
    }
    .input-key {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-muted);
      margin-bottom: 4px;
    }
    .input-val {
      font-size: 18px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--c-text);
    }
    .input-val small {
      font-size: 11px;
      color: var(--c-muted);
      font-weight: 400;
      margin-left: 3px;
    }

    /* ── Section 3: System Status ── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--c-border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 12px; color: var(--c-muted); }
    .stat-val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }

    /* Battery bar */
    .bar-wrap {
      height: 8px;
      background: var(--c-surface);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease;
    }

    /* ── Section 4: Light Status ── */
    .lights-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .light-item {
      background: var(--c-surface);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      border: 0.5px solid var(--c-border);
    }
    .bulb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin: 0 auto 6px;
      transition: all 0.5s;
    }
    .bulb.on-high { background: var(--c-high); box-shadow: 0 0 12px rgba(249,115,22,0.4); }
    .bulb.on-med  { background: var(--c-med);  box-shadow: 0 0 10px rgba(250,204,21,0.35); }
    .bulb.on-low  { background: var(--c-low);  box-shadow: 0 0 8px rgba(34,211,238,0.3); }
    .bulb.off     { background: var(--c-surface); border: 1px solid var(--c-border2); }
    .light-name   { font-family: var(--font-mono); font-size: 10px; color: var(--c-muted); }
    .light-state  { font-size: 11px; font-weight: 600; margin-top: 3px; }

    /* ── Section 5: Analytics ── */
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric-chip {
      background: var(--c-surface);
      border: 0.5px solid var(--c-border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric-num {
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .metric-label { font-size: 11px; color: var(--c-muted); margin-top: 2px; }

    /* Comparison bars */
    .compare-row { margin-bottom: 10px; }
    .compare-label {
      font-size: 11px;
      color: var(--c-muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .bar-track {
      height: 10px;
      background: var(--c-surface);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-seg { height: 100%; border-radius: 99px; }

    /* ── Chart ── */
    .chart-wrap { position: relative; width: 100%; height: 140px; }

    /* ── Button ── */
    .refresh-btn {
      background: transparent;
      border: 0.5px solid var(--c-border2);
      color: var(--c-muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--c-accent); color: var(--c-accent); }
  </style>
</head>
<body>

<div class="dash">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="hdr-title"><span class="live-dot"></span>Piezo-AI Energy Dashboard</div>
      <div class="hdr-sub" id="ts">Simulated — connect live data to activate</div>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">↻ Simulate new data</button>
  </div>

  <!-- 1. AI OUTPUT -->
  <div class="card col-span3">
    <div class="card-label">1 — AI output · zone decisions</div>
    <div class="zones" id="zones"></div>
  </div>

  <!-- 2. INPUT DATA STREAM -->
  <div class="card col-span2">
    <div class="card-label">2 — Input data stream</div>
    <div class="inputs-grid" id="inputs"></div>
  </div>

  <!-- 3. SYSTEM STATUS -->
  <div class="card">
    <div class="card-label">3 — System status</div>
    <div id="sys-stats"></div>
    <div style="margin-top:10px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
        <span style="color:var(--c-muted)">Battery level</span>
        <span id="bat-pct" style="font-family:var(--font-mono);font-size:11px;"></span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="bat-bar"></div></div>
    </div>
  </div>

  <!-- 4. LIGHT STATUS -->
  <div class="card col-span2">
    <div class="card-label">4 — Light status · per zone LED</div>
    <div class="lights-grid" id="lights"></div>
  </div>

  <!-- 5. ANALYTICS -->
  <div class="card">
    <div class="card-label">5 — Analytics</div>
    <div class="analytics-grid" id="analytics-chips"></div>
    <div id="compare"></div>
  </div>

  <!-- DAILY USAGE GRAPH -->
  <div class="card col-span3">
    <div class="card-label">5b — Daily usage graph · AI vs normal system (kWh)</div>
    <div class="chart-wrap">
      <canvas id="usageChart"
        role="img"
        aria-label="Bar chart comparing AI vs normal system energy usage over 24 hours">
        Hourly energy usage comparison chart.
      </canvas>
    </div>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  // CONFIG
  // To connect real data, replace the values in
  // fetchRealData() with your actual API calls.
  // ─────────────────────────────────────────────

  const ZONE_NAMES = ['Zone A', 'Zone B', 'Zone C', 'Zone D'];
  const BRIGHTNESS_MAP = { HIGH: 100, MEDIUM: 60, LOW: 20, OFF: 0 };
  const WEATHER_OPTIONS = ['Clear', 'Cloudy', 'Rain', 'Drizzle'];

  let chartInstance = null;

  // ─────────────────────────────────────────────
  // SIMULATED DATA  (replace this with real data)
  // ─────────────────────────────────────────────
  function fetchSimulatedData() {
    const hour    = new Date().getHours();
    const weather = WEATHER_OPTIONS[Math.floor(Math.random() * WEATHER_OPTIONS.length)];
    const people  = randInt(0, 50);
    const piezo   = randInt(50, 620);

    const zoneData = ZONE_NAMES.map(name => {
      const zPeople = Math.max(0, people + randInt(-8, 8));
      const zPiezo  = Math.max(50, piezo + randInt(-100, 100));
      const level   = rfDecision(zPeople, zPiezo);
      return { name, level, brightness: BRIGHTNESS_MAP[level], people: zPeople, piezo: zPiezo };
    });

    return {
      hour,
      weather,
      people,
      piezo,
      zoneData,
      energyHarvested: (piezo * 0.08).toFixed(1),   // watts (simulated)
      batteryLevel:    randInt(35, 95),               // percent
      energySaved:     randInt(28, 55),               // percent vs normal
    };
  }

  // ─────────────────────────────────────────────
  // RANDOM FOREST DECISION (simplified simulation)
  // Replace with actual model output from Python
  // ─────────────────────────────────────────────
  function rfDecision(people, piezo) {
    if (piezo > 400 && people > 20) return 'HIGH';
    if (piezo > 200 && people > 10) return 'MEDIUM';
    if (piezo > 100 || people > 5)  return 'LOW';
    return 'OFF';
  }

  // ─────────────────────────────────────────────
  // RENDER FUNCTIONS
  // ─────────────────────────────────────────────

  function renderZones(zoneData) {
    document.getElementById('zones').innerHTML = zoneData.map(z => `
      <div class="zone-card ${z.level}">
        <div class="zone-name">${z.name}</div>
        <div class="zone-badge">${z.level}</div>
        <div class="zone-bright">${z.brightness}<span style="font-size:13px;color:var(--c-muted)">%</span></div>
      </div>`).join('');
  }

  function renderInputs(s) {
    document.getElementById('inputs').innerHTML = `
      <div class="input-row">
        <div class="input-key">People count</div>
        <div class="input-val">${s.people}<small>persons</small></div>
      </div>
      <div class="input-row">
        <div class="input-key">Time</div>
        <div class="input-val">${String(s.hour).padStart(2,'0')}:00<small>hrs</small></div>
      </div>
      <div class="input-row">
        <div class="input-key">Weather</div>
        <div class="input-val" style="font-size:15px;">${s.weather}</div>
      </div>
      <div class="input-row">
        <div class="input-key">Piezo reading</div>
        <div class="input-val">${s.piezo}<small>units</small></div>
      </div>`;
  }

  function renderSystemStatus(s) {
    document.getElementById('sys-stats').innerHTML = `
      <div class="stat-row">
        <span class="stat-label">Energy harvested</span>
        <span class="stat-val" style="color:var(--c-green)">${s.energyHarvested} W</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Active zones</span>
        <span class="stat-val">${s.zoneData.filter(z => z.level !== 'OFF').length} / ${ZONE_NAMES.length}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">AI model</span>
        <span class="stat-val" style="color:var(--c-accent)">Random Forest</span>
      </div>`;

    const bar = document.getElementById('bat-bar');
    bar.style.width    = s.batteryLevel + '%';
    bar.style.background = s.batteryLevel > 60
      ? 'var(--c-green)'
      : s.batteryLevel > 30
        ? 'var(--c-med)'
        : 'var(--c-high)';
    document.getElementById('bat-pct').textContent = s.batteryLevel + '%';
  }

  function renderLights(zoneData) {
    const bulbClass = { HIGH: 'on-high', MEDIUM: 'on-med', LOW: 'on-low', OFF: 'off' };
    const brightColor = {
      HIGH: 'var(--c-high)', MEDIUM: 'var(--c-med)',
      LOW:  'var(--c-low)',  OFF:    'var(--c-off)'
    };
    document.getElementById('lights').innerHTML = zoneData.map(z => `
      <div class="light-item">
        <div class="bulb ${bulbClass[z.level]}"></div>
        <div class="light-name">${z.name}</div>
        <div class="light-state" style="color:${brightColor[z.level]}">${z.brightness}%</div>
      </div>`).join('');
  }

  function renderAnalytics(s) {
    const aiUsage = 100 - s.energySaved;

    document.getElementById('analytics-chips').innerHTML = `
      <div class="metric-chip">
        <div class="metric-num" style="color:var(--c-green)">${s.energySaved}%</div>
        <div class="metric-label">Energy saved vs normal</div>
      </div>
      <div class="metric-chip">
        <div class="metric-num" style="color:var(--c-accent)">${(s.energyHarvested * 24 / 1000).toFixed(2)}</div>
        <div class="metric-label">Est. daily harvest (kWh)</div>
      </div>`;

    document.getElementById('compare').innerHTML = `
      <div class="compare-row">
        <div class="compare-label">
          <span>AI system</span>
          <span style="color:var(--c-green)">${aiUsage}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-seg" style="width:${aiUsage}%;background:var(--c-green)"></div>
        </div>
      </div>
      <div class="compare-row">
        <div class="compare-label">
          <span>Rule-based / normal</span>
          <span>100%</span>
        </div>
        <div class="bar-track">
          <div class="bar-seg" style="width:100%;background:var(--c-muted)"></div>
        </div>
      </div>`;
  }

  function buildChart() {
    const hours   = Array.from({ length: 24 }, (_, i) => i + 'h');
    const normal  = hours.map(() => randInt(80, 110));
    const ai      = normal.map(v => Math.round(v * (0.4 + Math.random() * 0.35)));

    const ctx = document.getElementById('usageChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: hours,
        datasets: [
          {
            label: 'Normal system',
            data: normal,
            backgroundColor: 'rgba(122,132,153,0.35)',
            borderColor:     'rgba(122,132,153,0.6)',
            borderWidth: 0.5,
          },
          {
            label: 'AI system',
            data: ai,
            backgroundColor: 'rgba(74,222,128,0.3)',
            borderColor:     'rgba(74,222,128,0.7)',
            borderWidth: 0.5,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks:  { color: '#7a8499', font: { size: 10 }, maxRotation: 0 },
            grid:   { color: 'rgba(255,255,255,0.04)' },
            border: { color: 'rgba(255,255,255,0.06)' }
          },
          y: {
            ticks:  { color: '#7a8499', font: { size: 10 } },
            grid:   { color: 'rgba(255,255,255,0.04)' },
            border: { color: 'rgba(255,255,255,0.06)' },
            title:  { display: true, text: 'kWh', color: '#7a8499', font: { size: 10 } }
          }
        }
      }
    });
  }

  // ─────────────────────────────────────────────
  // MAIN REFRESH
  // ─────────────────────────────────────────────
  function refreshAll() {
    // 👇 Swap fetchSimulatedData() with your real API fetch when ready
    const data = fetchSimulatedData();

    renderZones(data.zoneData);
    renderInputs(data);
    renderSystemStatus(data);
    renderLights(data.zoneData);
    renderAnalytics(data);
    buildChart();

    const now = new Date();
    document.getElementById('ts').textContent =
      `Simulated · last updated ${now.toLocaleTimeString()}`;
  }

  // ─────────────────────────────────────────────
  // UTILS
  // ─────────────────────────────────────────────
  function randInt(a, b) {
    return Math.floor(Math.random() * (b - a + 1)) + a;
  }

  // ─────────────────────────────────────────────
  // INIT — auto-refresh every 8 seconds
  // ─────────────────────────────────────────────
  refreshAll();
  setInterval(refreshAll, 8000);

  // ─────────────────────────────────────────────
  // HOW TO CONNECT REAL DATA
  // ─────────────────────────────────────────────
  /*
    1. PYTHON FLASK SERVER (laptop)
       Your Flask server receives data from ESP32 and
       exposes an endpoint, e.g. GET /api/data
       Response JSON:
       {
         "hour": 21,
         "weather": "Rain",
         "people": 18,
         "piezo": 450,
         "zones": [
           { "name": "Zone A", "level": "HIGH", "brightness": 100 },
           ...
         ],
         "energy_harvested": 36.0,
         "battery_level": 72,
         "energy_saved": 42
       }

    2. REPLACE fetchSimulatedData() with:
       async function fetchRealData() {
         const res  = await fetch('http://YOUR_LAPTOP_IP:5000/api/data');
         const json = await res.json();
         return {
           hour:            json.hour,
           weather:         json.weather,
           people:          json.people,
           piezo:           json.piezo,
           zoneData:        json.zones.map(z => ({
                              ...z,
                              brightness: BRIGHTNESS_MAP[z.level]
                            })),
           energyHarvested: json.energy_harvested,
           batteryLevel:    json.battery_level,
           energySaved:     json.energy_saved,
         };
       }

    3. Make refreshAll() async and await the data:
       async function refreshAll() {
         const data = await fetchRealData();
         renderZones(data.zoneData);
         ...
       }

    4. For the AI model prediction (Random Forest):
       - Run the model on your Python server
       - Return the zone level ("HIGH"/"MEDIUM"/"LOW"/"OFF")
         as part of the /api/data response
       - The dashboard just displays what the model returns
  */
</script>

</body>
</html>
