<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piezo-AI Energy Dashboard v2</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:       #080a0f;
      --c-surface:  #0e1118;
      --c-card:     #12161f;
      --c-card2:    #181d28;
      --c-border:   rgba(255,255,255,0.06);
      --c-border2:  rgba(255,255,255,0.11);
      --c-text:     #dde3f0;
      --c-muted:    #5a6478;
      --c-muted2:   #8a96ad;
      --c-high:     #ff6b35;
      --c-med:      #f5c518;
      --c-low:      #18d4f0;
      --c-off:      #3a4459;
      --c-green:    #39e07a;
      --c-accent:   #7c6ef5;
      --c-accent2:  #a78bfa;
      --c-red:      #f05252;
      --font:       'Syne', sans-serif;
      --mono:       'IBM Plex Mono', monospace;
      --r:          10px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP BAR ─────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,10,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--c-border2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c-accent2);
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(57,224,122,0.08);
      border: 0.5px solid rgba(57,224,122,0.2);
      border-radius: 20px;
      padding: 3px 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--c-green);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--c-green);
      animation: blink 1.8s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .topbar-right { display: flex; align-items: center; gap: 8px; }
    #ts {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--c-muted);
    }
    .btn {
      background: transparent;
      border: 0.5px solid var(--c-border2);
      color: var(--c-muted2);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--c-accent); color: var(--c-accent2); }
    .btn.active { border-color: var(--c-accent); color: var(--c-accent2); background: rgba(124,110,245,0.1); }

    /* ── ZONE SELECTOR MAP ───────────────────── */
    .zone-map-wrap {
      padding: 16px 20px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .zone-map-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-muted);
      flex-shrink: 0;
    }
    .zone-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .zone-tab {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      padding: 10px 18px;
      border: 0.5px solid var(--c-border2);
      background: var(--c-card);
      transition: all 0.22s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 90px;
    }
    .zone-tab:hover { border-color: var(--c-accent); transform: translateY(-1px); }
    .zone-tab.selected {
      border-color: var(--c-accent2);
      background: rgba(124,110,245,0.1);
      box-shadow: 0 0 16px rgba(124,110,245,0.15);
    }
    .zone-tab-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--c-text);
    }
    .zone-tab-level {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 10px;
      letter-spacing: 0.07em;
    }
    .zone-tab-bright {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--c-muted2);
    }

    /* tiny streetlight icon on each tab */
    .zone-icon {
      font-size: 18px;
      line-height: 1;
    }

    /* ── MAIN GRID ───────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 14px 20px 20px;
    }

    .card {
      background: var(--c-card);
      border: 0.5px solid var(--c-border);
      border-radius: var(--r);
      padding: 14px 16px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-bottom: 12px;
    }

    .col2 { grid-column: span 2; }
    .col3 { grid-column: 1/-1; }

    /* ── INPUT DATA STREAM ───────────────────── */
    .inputs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .input-row {
      background: var(--c-surface);
      border-radius: 7px;
      padding: 10px 12px;
      border: 0.5px solid var(--c-border);
    }
    .input-key {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--c-muted);
      margin-bottom: 5px;
    }
    .input-val {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--c-text);
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .input-val small {
      font-size: 10px;
      color: var(--c-muted);
      font-weight: 400;
    }
    .input-icon { font-size: 22px; margin-bottom: 4px; }

    /* ── AI OUTPUT CARD ──────────────────────── */
    .ai-output-big {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
    }
    .ai-level-badge {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.06em;
      padding: 6px 24px;
      border-radius: 30px;
    }
    .ai-bright-big {
      font-family: var(--mono);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
    }
    .ai-bright-unit { font-size: 18px; color: var(--c-muted2); }
    .ai-label { font-family: var(--mono); font-size: 10px; color: var(--c-muted); }

    /* ── SYSTEM STATUS ───────────────────────── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--c-border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 12px; color: var(--c-muted2); }
    .stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }

    .bar-wrap { height: 8px; background: var(--c-surface); border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width 0.7s ease, background 0.4s; }

    /* ── LIGHT STATUS ────────────────────────── */
    .light-big {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
    }
    .bulb-big {
      width: 60px; height: 60px;
      border-radius: 50%;
      transition: all 0.6s ease;
      position: relative;
    }
    .bulb-big::after {
      content:'';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      opacity: 0.3;
      animation: glow 2.5s infinite;
    }
    @keyframes glow { 0%,100%{opacity:0.2} 50%{opacity:0.45} }
    .bulb-big.on-high { background: var(--c-high); box-shadow: 0 0 30px rgba(255,107,53,0.45); }
    .bulb-big.on-high::after { background: radial-gradient(circle, var(--c-high), transparent); }
    .bulb-big.on-med  { background: var(--c-med);  box-shadow: 0 0 24px rgba(245,197,24,0.4); }
    .bulb-big.on-med::after  { background: radial-gradient(circle, var(--c-med), transparent); }
    .bulb-big.on-low  { background: var(--c-low);  box-shadow: 0 0 20px rgba(24,212,240,0.35); }
    .bulb-big.on-low::after  { background: radial-gradient(circle, var(--c-low), transparent); }
    .bulb-big.off     { background: var(--c-surface); border: 1.5px solid var(--c-border2); box-shadow: none; }
    .bulb-big.off::after { display: none; }
    .light-state-label { font-size: 13px; font-weight: 600; font-family: var(--mono); }
    .light-desc { font-size: 11px; color: var(--c-muted); text-align: center; }

    /* ── ANALYTICS ───────────────────────────── */
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric-chip {
      background: var(--c-surface);
      border: 0.5px solid var(--c-border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric-num {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1.1;
    }
    .metric-label { font-size: 11px; color: var(--c-muted); margin-top: 3px; }

    .compare-row { margin-bottom: 10px; }
    .compare-label {
      font-size: 11px;
      color: var(--c-muted2);
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .bar-track { height: 10px; background: var(--c-surface); border-radius: 99px; overflow: hidden; }
    .bar-seg   { height: 100%; border-radius: 99px; transition: width 0.7s ease; }

    /* ── GRAPH SECTION ───────────────────────── */
    .graph-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .date-input {
      background: var(--c-surface);
      border: 0.5px solid var(--c-border2);
      border-radius: 6px;
      color: var(--c-text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .date-input:hover, .date-input:focus { border-color: var(--c-accent); }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    .graph-legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--c-muted2);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .chart-wrap { position: relative; width: 100%; height: 220px; }

    /* ── ZONE OVERVIEW MINI STRIP ───────────── */
    .overview-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 0;
    }
    .mini-zone {
      background: var(--c-card);
      border: 0.5px solid var(--c-border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mini-zone:hover { border-color: var(--c-accent); }
    .mini-zone.selected { border-color: var(--c-accent2); background: rgba(124,110,245,0.08); }
    .mini-bulb { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .mini-bulb.on-high { background: var(--c-high); box-shadow: 0 0 6px rgba(255,107,53,0.5); }
    .mini-bulb.on-med  { background: var(--c-med);  box-shadow: 0 0 6px rgba(245,197,24,0.5); }
    .mini-bulb.on-low  { background: var(--c-low);  box-shadow: 0 0 6px rgba(24,212,240,0.5); }
    .mini-bulb.off     { background: var(--c-muted); }
    .mini-info { flex: 1; min-width: 0; }
    .mini-name { font-size: 12px; font-weight: 600; }
    .mini-level {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--c-muted);
      margin-top: 1px;
    }
    .mini-pct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
    }

    /* ── SECTION DIVIDER ─────────────────────── */
    .section-hdr {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0 2px;
    }
    .section-hdr-text {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c-muted);
    }
    .section-hdr-zone {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 12px;
      font-family: var(--mono);
      background: rgba(124,110,245,0.12);
      color: var(--c-accent2);
      border: 0.5px solid rgba(124,110,245,0.3);
    }
    .section-line { flex: 1; height: 0.5px; background: var(--c-border); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">⚡ Piezo-AI Energy Dashboard</div>
    <div class="live-pill"><div class="live-dot"></div>LIVE SIM</div>
  </div>
  <div class="topbar-right">
    <span id="ts"></span>
    <button class="btn" onclick="refreshAll()">↻ Refresh</button>
  </div>
</div>

<!-- ZONE OVERVIEW STRIP (always visible) -->
<div style="padding: 14px 20px 10px;">
  <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-muted);margin-bottom:8px;">All Zones — click to focus</div>
  <div class="overview-strip" id="overview-strip"></div>
</div>

<!-- ZONE SELECTOR TABS -->
<div class="zone-map-wrap">
  <div class="zone-map-label">Focus zone →</div>
  <div class="zone-tabs" id="zone-tabs"></div>
</div>

<!-- MAIN CONTENT GRID -->
<div class="main" id="main-grid">

  <!-- SECTION HEADER -->
  <div class="section-hdr">
    <div class="section-hdr-text">Viewing</div>
    <div class="section-hdr-zone" id="section-zone-label">Zone A</div>
    <div class="section-line"></div>
  </div>

  <!-- 1. AI OUTPUT -->
  <div class="card" id="card-ai-output">
    <div class="card-label">1 — AI output</div>
    <div class="ai-output-big" id="ai-output"></div>
  </div>

  <!-- 2. INPUT DATA STREAM -->
  <div class="card col2" id="card-inputs">
    <div class="card-label">2 — Input data stream</div>
    <div class="inputs-grid" id="inputs"></div>
  </div>

  <!-- 3. SYSTEM STATUS -->
  <div class="card" id="card-sys">
    <div class="card-label">3 — System status</div>
    <div id="sys-stats"></div>
    <div style="margin-top:10px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
        <span style="color:var(--c-muted)">Battery level</span>
        <span id="bat-pct" style="font-family:var(--mono);font-size:11px;"></span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="bat-bar"></div></div>
    </div>
  </div>

  <!-- 4. LIGHT STATUS -->
  <div class="card" id="card-light">
    <div class="card-label">4 — Light status</div>
    <div class="light-big" id="light-status"></div>
  </div>

  <!-- 5. ANALYTICS -->
  <div class="card col2" id="card-analytics">
    <div class="card-label">5 — Analytics</div>
    <div class="analytics-grid" id="analytics-chips"></div>
    <div id="compare"></div>
  </div>

  <!-- 6. DAILY USAGE GRAPH -->
  <div class="card col3" id="card-graph">
    <div class="card-label" id="graph-label">5b — Daily usage · AI vs Normal (kWh)</div>
    <div class="graph-controls">
      <label style="font-family:var(--mono);font-size:10px;color:var(--c-muted);margin-right:2px;">Date:</label>
      <input type="date" class="date-input" id="date-picker" onchange="onDateChange()"/>
      <button class="btn" id="btn-today" onclick="setToday()">Today</button>
      <button class="btn" id="btn-prev"  onclick="shiftDate(-1)">◀ Prev</button>
      <button class="btn" id="btn-next"  onclick="shiftDate(1)">Next ▶</button>
      <div class="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-muted2)"></div>Normal system</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-green)"></div>AI system</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="usageChart"></canvas></div>
  </div>

</div><!-- end .main -->

<script>
// ════════════════════════════════════════════════
//  CONFIG & CONSTANTS
// ════════════════════════════════════════════════
const ZONES = ['Zone A', 'Zone B', 'Zone C', 'Zone D'];
const WEATHER_OPTS  = ['Clear ☀️', 'Cloudy ☁️', 'Rain 🌧️', 'Drizzle 🌦️'];
const BRIGHT_MAP    = { HIGH: 100, MEDIUM: 60, LOW: 20, OFF: 0 };
const ZONE_ICONS    = ['🏛️', '🛣️', '🌳', '🏢'];

let selectedZone = 0;          // index
let chartInstance = null;
let allZoneData   = [];         // generated data for all 4 zones

// ════════════════════════════════════════════════
//  DATA GENERATION (simulated — replace later)
// ════════════════════════════════════════════════
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function seedRand(seed) {
  // simple seeded random for consistent per-date data
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function rfDecision(people, piezo) {
  if (piezo > 400 && people > 20) return 'HIGH';
  if (piezo > 200 && people > 10) return 'MEDIUM';
  if (piezo > 100 || people > 5)  return 'LOW';
  return 'OFF';
}

function generateZoneData(zoneIdx) {
  const people  = randInt(0, 50);
  const piezo   = randInt(60, 620);
  const weather = WEATHER_OPTS[randInt(0, WEATHER_OPTS.length - 1)];
  const hour    = new Date().getHours();
  const level   = rfDecision(people, piezo);
  const saved   = randInt(25, 60);
  const bat     = randInt(30, 95);
  const harv    = +(piezo * 0.075).toFixed(1);

  return { zoneIdx, people, piezo, weather, hour, level,
           brightness: BRIGHT_MAP[level], energySaved: saved,
           battery: bat, harvested: harv };
}

function generateAllZones() {
  allZoneData = ZONES.map((_, i) => generateZoneData(i));
}

// Per-date hourly data for graph (seeded so same date = same data)
function generateHourlyData(zoneIdx, dateStr) {
  const seed = dateStr.split('-').join('') * 1 + zoneIdx * 7;
  const rng  = seedRand(seed);
  const hours = Array.from({ length: 24 }, (_, h) => h);
  const normal = hours.map(() => +(60 + rng() * 50).toFixed(1));
  const ai     = normal.map(v => +(v * (0.35 + rng() * 0.35)).toFixed(1));
  return { hours: hours.map(h => `${String(h).padStart(2,'0')}:00`), normal, ai };
}

// ════════════════════════════════════════════════
//  RENDER — ZONE TABS & OVERVIEW
// ════════════════════════════════════════════════
function levelColor(l) {
  return l==='HIGH'?'var(--c-high)':l==='MEDIUM'?'var(--c-med)':l==='LOW'?'var(--c-low)':'var(--c-off)';
}
function levelBg(l) {
  return l==='HIGH'?'rgba(255,107,53,0.15)':l==='MEDIUM'?'rgba(245,197,24,0.12)':l==='LOW'?'rgba(24,212,240,0.1)':'rgba(58,68,89,0.2)';
}
function bulbClass(l) {
  return l==='HIGH'?'on-high':l==='MEDIUM'?'on-med':l==='LOW'?'on-low':'off';
}

function renderZoneTabs() {
  const container = document.getElementById('zone-tabs');
  container.innerHTML = ZONES.map((name, i) => {
    const d = allZoneData[i];
    return `
      <div class="zone-tab ${i===selectedZone?'selected':''}" onclick="selectZone(${i})">
        <div class="zone-icon">${ZONE_ICONS[i]}</div>
        <div class="zone-tab-name">${name}</div>
        <div class="zone-tab-level" style="background:${levelBg(d.level)};color:${levelColor(d.level)};border:0.5px solid ${levelColor(d.level)}40;">${d.level}</div>
        <div class="zone-tab-bright">${d.brightness}%</div>
      </div>`;
  }).join('');
}

function renderOverviewStrip() {
  const container = document.getElementById('overview-strip');
  container.innerHTML = ZONES.map((name, i) => {
    const d = allZoneData[i];
    return `
      <div class="mini-zone ${i===selectedZone?'selected':''}" onclick="selectZone(${i})">
        <div class="mini-bulb ${bulbClass(d.level)}"></div>
        <div class="mini-info">
          <div class="mini-name">${name}</div>
          <div class="mini-level" style="color:${levelColor(d.level)}">${d.level} · ${d.people}ppl</div>
        </div>
        <div class="mini-pct" style="color:${levelColor(d.level)}">${d.brightness}%</div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
//  RENDER — ZONE DETAIL PANELS
// ════════════════════════════════════════════════
function renderAIOutput(d) {
  document.getElementById('ai-output').innerHTML = `
    <div class="ai-label">Demand level</div>
    <div class="ai-level-badge" style="background:${levelBg(d.level)};color:${levelColor(d.level)};border:1px solid ${levelColor(d.level)}50;">
      ${d.level}
    </div>
    <div class="ai-label" style="margin-top:4px;">Brightness</div>
    <div class="ai-bright-big" style="color:${levelColor(d.level)}">
      ${d.brightness}<span class="ai-bright-unit">%</span>
    </div>
    <div class="ai-label">Random Forest Classifier</div>`;
}

function renderInputs(d) {
  const wIco = { 'Clear ☀️':'☀️','Cloudy ☁️':'☁️','Rain 🌧️':'🌧️','Drizzle 🌦️':'🌦️' };
  document.getElementById('inputs').innerHTML = `
    <div class="input-row">
      <div class="input-icon">👥</div>
      <div class="input-key">People count</div>
      <div class="input-val">${d.people}<small>persons</small></div>
    </div>
    <div class="input-row">
      <div class="input-icon">🕐</div>
      <div class="input-key">Current time</div>
      <div class="input-val">${String(d.hour).padStart(2,'0')}:00<small>hrs</small></div>
    </div>
    <div class="input-row">
      <div class="input-icon">${wIco[d.weather]||'🌤️'}</div>
      <div class="input-key">Weather</div>
      <div class="input-val" style="font-size:14px;">${d.weather.replace(/[^\w\s]/g,'').trim()}</div>
    </div>
    <div class="input-row">
      <div class="input-icon">⚡</div>
      <div class="input-key">Piezo reading</div>
      <div class="input-val">${d.piezo}<small>units</small></div>
    </div>`;
}

function renderSystemStatus(d) {
  document.getElementById('sys-stats').innerHTML = `
    <div class="stat-row">
      <span class="stat-label">Energy harvested</span>
      <span class="stat-val" style="color:var(--c-green)">${d.harvested} W</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Zone status</span>
      <span class="stat-val" style="color:${levelColor(d.level)}">${d.level}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">AI model</span>
      <span class="stat-val" style="color:var(--c-accent2)">Random Forest</span>
    </div>`;

  const bar = document.getElementById('bat-bar');
  bar.style.width = d.battery + '%';
  bar.style.background = d.battery > 60 ? 'var(--c-green)'
                        : d.battery > 30 ? 'var(--c-med)'
                        : 'var(--c-high)';
  document.getElementById('bat-pct').textContent = d.battery + '%';
}

function renderLightStatus(d) {
  const cls   = bulbClass(d.level);
  const color = levelColor(d.level);
  const desc  = {
    HIGH:   `Full brightness — high pedestrian activity detected`,
    MEDIUM: `Moderate brightness — normal foot traffic`,
    LOW:    `Dim mode — low activity in this zone`,
    OFF:    `Light off — no activity detected`,
  }[d.level];
  document.getElementById('light-status').innerHTML = `
    <div class="bulb-big ${cls}"></div>
    <div class="light-state-label" style="color:${color}">${d.brightness}% brightness</div>
    <div class="ai-label">Streetlight · ${ZONES[d.zoneIdx]}</div>
    <div class="light-desc">${desc}</div>`;
}

function renderAnalytics(d) {
  const aiUsage = 100 - d.energySaved;
  const daily   = (d.harvested * 24 / 1000).toFixed(2);

  document.getElementById('analytics-chips').innerHTML = `
    <div class="metric-chip">
      <div class="metric-num" style="color:var(--c-green)">${d.energySaved}%</div>
      <div class="metric-label">Energy saved vs normal</div>
    </div>
    <div class="metric-chip">
      <div class="metric-num" style="color:var(--c-accent2)">${daily}</div>
      <div class="metric-label">Est. daily harvest (kWh)</div>
    </div>`;

  document.getElementById('compare').innerHTML = `
    <div class="compare-row">
      <div class="compare-label">
        <span>AI system (${ZONES[d.zoneIdx]})</span>
        <span style="color:var(--c-green)">${aiUsage}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-seg" style="width:${aiUsage}%;background:var(--c-green)"></div>
      </div>
    </div>
    <div class="compare-row">
      <div class="compare-label">
        <span>Rule-based / Normal</span>
        <span>100%</span>
      </div>
      <div class="bar-track">
        <div class="bar-seg" style="width:100%;background:var(--c-muted)"></div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════
//  RENDER — GRAPH
// ════════════════════════════════════════════════
function renderGraph() {
  const dateStr = document.getElementById('date-picker').value;
  const data    = generateHourlyData(selectedZone, dateStr);

  document.getElementById('graph-label').textContent =
    `5b — Daily usage · ${ZONES[selectedZone]} · AI vs Normal (kWh) · ${formatDate(dateStr)}`;

  const ctx = document.getElementById('usageChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.hours,
      datasets: [
        {
          label: 'Normal system',
          data: data.normal,
          borderColor: 'rgba(138,150,173,0.7)',
          backgroundColor: 'rgba(138,150,173,0.06)',
          borderWidth: 1.5,
          pointRadius: 2,
          pointHoverRadius: 5,
          tension: 0.4,
          fill: true,
        },
        {
          label: 'AI system',
          data: data.ai,
          borderColor: 'rgba(57,224,122,0.85)',
          backgroundColor: 'rgba(57,224,122,0.07)',
          borderWidth: 2,
          pointRadius: 2,
          pointHoverRadius: 5,
          tension: 0.4,
          fill: true,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(14,17,24,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 0.5,
          titleColor: '#8a96ad',
          bodyColor: '#dde3f0',
          titleFont: { family: "'IBM Plex Mono', monospace", size: 10 },
          bodyFont:  { family: "'IBM Plex Mono', monospace", size: 11 },
          padding: 10,
          callbacks: {
            title: items => `${items[0].label}  —  ${ZONES[selectedZone]}`,
            label: item => ` ${item.dataset.label}: ${item.parsed.y} kWh`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#5a6478',
            font: { family: "'IBM Plex Mono', monospace", size: 9 },
            maxRotation: 0,
            maxTicksLimit: 12,
          },
          grid: { color: 'rgba(255,255,255,0.03)' },
          border: { color: 'rgba(255,255,255,0.05)' },
        },
        y: {
          ticks: { color: '#5a6478', font: { family: "'IBM Plex Mono', monospace", size: 9 } },
          grid: { color: 'rgba(255,255,255,0.03)' },
          border: { color: 'rgba(255,255,255,0.05)' },
          title: {
            display: true,
            text: 'kWh',
            color: '#5a6478',
            font: { family: "'IBM Plex Mono', monospace", size: 9 },
          }
        }
      }
    }
  });
}

// ════════════════════════════════════════════════
//  DATE HELPERS
// ════════════════════════════════════════════════
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function formatDate(str) {
  if (!str) return '';
  const [y, m, day] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function setToday() {
  document.getElementById('date-picker').value = todayStr();
  renderGraph();
}

function shiftDate(delta) {
  const picker = document.getElementById('date-picker');
  const d = new Date(picker.value || todayStr());
  d.setDate(d.getDate() + delta);
  picker.value = d.toISOString().split('T')[0];
  renderGraph();
}

function onDateChange() { renderGraph(); }

// ════════════════════════════════════════════════
//  ZONE SELECTION
// ════════════════════════════════════════════════
function selectZone(idx) {
  selectedZone = idx;
  document.getElementById('section-zone-label').textContent = ZONES[idx];
  renderAllPanels();
}

function renderAllPanels() {
  const d = allZoneData[selectedZone];
  renderZoneTabs();
  renderOverviewStrip();
  renderAIOutput(d);
  renderInputs(d);
  renderSystemStatus(d);
  renderLightStatus(d);
  renderAnalytics(d);
  renderGraph();
}

// ════════════════════════════════════════════════
//  MAIN REFRESH
// ════════════════════════════════════════════════
function refreshAll() {
  generateAllZones();
  renderAllPanels();
  const now = new Date();
  document.getElementById('ts').textContent =
    now.toLocaleDateString('en-MY', { day:'numeric', month:'short' }) +
    ' · ' + now.toLocaleTimeString();
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
document.getElementById('date-picker').value = todayStr();
refreshAll();
setInterval(refreshAll, 10000);   // auto-refresh every 10s
